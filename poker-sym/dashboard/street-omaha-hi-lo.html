<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poker-sym — Street Analysis — Omaha Hi/Lo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 0.25rem; color: #f1f5f9; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 0.5rem; }
    .nav { text-align: center; margin-bottom: 1.5rem; }
    .nav a { color: #3b82f6; text-decoration: none; font-size: 0.85rem; }
    .nav a:hover { text-decoration: underline; }

    .controls {
      max-width: 700px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: end;
      flex-wrap: wrap;
      justify-content: center;
    }
    .field { display: flex; flex-direction: column; gap: 0.25rem; }
    .field label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #f1f5f9;
      font-size: 1rem;
      width: 120px;
    }
    .field input:focus { outline: none; border-color: #3b82f6; }

    button#run {
      background: #8b5cf6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button#run:hover { background: #7c3aed; }
    button#run:disabled { background: #475569; cursor: not-allowed; }

    .progress-container {
      max-width: 700px;
      margin: 0 auto 1rem;
      display: none;
    }
    .progress-container.active { display: block; }
    .progress-bar-bg {
      background: #1e293b;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #8b5cf6;
      height: 100%;
      width: 0%;
      transition: width 0.15s;
      border-radius: 999px;
    }
    .progress-text {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    .init-status {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .init-status.ready { color: #22c55e; }
    .btn-stop {
      padding: 0.55rem 1.25rem;
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .btn-stop:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-stop:not(:disabled):hover { background: #991b1b; }
    .eta-hint {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.35rem;
      min-height: 1.2rem;
    }

    .results-container {
      max-width: 1100px;
      margin: 0 auto;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
    }
    th {
      background: #1e293b;
      padding: 0.6rem 0.6rem;
      text-align: left;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      font-size: 0.65rem;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
    }
    th.sortable {
      cursor: pointer;
      user-select: none;
    }
    th.sortable:hover { color: #e2e8f0; }
    td { padding: 0.4rem 0.6rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b44; }
    .hand-cell { font-weight: 700; font-family: 'Courier New', monospace; font-size: 0.95rem; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <h1>♠ poker-sym — Street Analysis ♥</h1>
  <p class="subtitle">Flop / Turn / River Evolution — Omaha Hi/Lo Starting Hands</p>
  <div class="nav">
    <a href="index.html">🏠 Home</a><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <a href="street.html">Hold'em</a><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <a href="street-omaha.html">Omaha Hi</a><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <strong style="color:#8b5cf6;font-size:0.85rem">Omaha Hi/Lo</strong><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <a href="street-stud.html">Stud</a><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <a href="street-stud-hi-lo.html">Stud Hi/Lo</a><span class="sep" style="color:#475569;margin:0 0.3rem">·</span>
    <a href="street-razz.html">Razz</a>
  </div>

  <div id="initStatus" class="init-status">Initializing evaluator...</div>

  <div class="controls">
    <div class="field">
      <label for="runs">Runs / Hand</label>
      <input type="number" id="runs" value="500" min="10" max="100000" step="100" />
    </div>
    <div class="field">
      <label for="opponents">Opponents</label>
      <input type="number" id="opponents" value="1" min="1" max="9" step="1" />
    </div>
    <div class="field">
      <label for="seed">Seed</label>
      <input type="number" id="seed" value="" min="0" placeholder="random" />
    </div>
    <button id="run" disabled>Run Street Analysis</button>
    <button id="stop" class="btn-stop" disabled>Stop</button>
  </div>

  <div id="etaText" class="eta-hint"></div>

  </div>

  <div id="progressContainer" class="progress-container">
    <div class="progress-bar-bg">
      <div id="progressFill" class="progress-bar-fill"></div>
    </div>
    <div id="progressText" class="progress-text"></div>
  </div>

  <div id="results" class="results-container"></div>

  <script type="module" src="/src/street-omaha-hi-lo-main.ts"></script>
</body>
</html>
