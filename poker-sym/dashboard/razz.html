<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>poker-sym — Razz Starting Hand Ranking</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem;
    }
    h1 { text-align: center; font-size: 1.5rem; margin-bottom: 0.25rem; color: #f1f5f9; }
    .subtitle { text-align: center; color: #94a3b8; font-size: 0.85rem; margin-bottom: 1.5rem; }

    .nav { text-align: center; margin-bottom: 1.5rem; }
    .nav a { color: #3b82f6; font-size: 0.85rem; text-decoration: none; }
    .nav a:hover { text-decoration: underline; }
    .nav .sep { color: #475569; margin: 0 0.3rem; }

    .controls {
      max-width: 600px;
      margin: 0 auto 1.5rem;
      display: flex;
      gap: 1rem;
      align-items: end;
      flex-wrap: wrap;
      justify-content: center;
    }
    .field { display: flex; flex-direction: column; gap: 0.25rem; }
    .field label { font-size: 0.75rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
    .field input {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      color: #f1f5f9;
      font-size: 1rem;
      width: 120px;
    }
    .field input:focus { outline: none; border-color: #3b82f6; }

    button#run {
      background: #3b82f6;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.55rem 1.5rem;
      font-size: 1rem;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }
    button#run:hover { background: #2563eb; }
    button#run:disabled { background: #475569; cursor: not-allowed; }

    .progress-container {
      max-width: 600px;
      margin: 0 auto 1rem;
      display: none;
    }
    .progress-container.active { display: block; }
    .progress-bar-bg {
      background: #1e293b;
      border-radius: 999px;
      height: 8px;
      overflow: hidden;
    }
    .progress-bar-fill {
      background: #3b82f6;
      height: 100%;
      width: 0%;
      transition: width 0.15s;
      border-radius: 999px;
    }
    .progress-text {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-top: 0.25rem;
    }

    .results-container {
      max-width: 800px;
      margin: 0 auto;
      overflow-x: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }
    th {
      background: #1e293b;
      padding: 0.6rem 0.75rem;
      text-align: left;
      font-weight: 600;
      color: #94a3b8;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.05em;
      position: sticky;
      top: 0;
    }
    td { padding: 0.45rem 0.75rem; border-bottom: 1px solid #1e293b; }
    tr:hover td { background: #1e293b44; }
    .hand-cell { font-weight: 700; font-family: 'Courier New', monospace; font-size: 0.95rem; }

    .tier-1 { border-left: 3px solid #22c55e; }
    .tier-2 { border-left: 3px solid #84cc16; }
    .tier-3 { border-left: 3px solid #eab308; }
    .tier-4 { border-left: 3px solid #f97316; }
    .tier-5 { border-left: 3px solid #ef4444; }
    .tier-6 { border-left: 3px solid #7f1d1d; }

    .tier-badge {
      display: inline-block;
      padding: 0.1rem 0.5rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
    }
    .tier-badge-1 { background: #22c55e33; color: #22c55e; }
    .tier-badge-2 { background: #84cc1633; color: #84cc16; }
    .tier-badge-3 { background: #eab30833; color: #eab308; }
    .tier-badge-4 { background: #f9731633; color: #f97316; }
    .tier-badge-5 { background: #ef444433; color: #ef4444; }
    .tier-badge-6 { background: #7f1d1d55; color: #fca5a5; }

    .init-status {
      text-align: center;
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.5rem;
    }
    .init-status.ready { color: #22c55e; }
  </style>
</head>
<body>
  <h1>♠ poker-sym ♥</h1>
  <p class="subtitle">Monte Carlo Starting Hand Ranking — Razz</p>

  <div class="nav">
    <a href="index.html">Hold'em</a><span class="sep">·</span>
    <a href="omaha.html">Omaha Hi</a><span class="sep">·</span>
    <a href="omaha-hi-lo.html">Omaha Hi/Lo</a><span class="sep">·</span>
    <a href="stud.html">Stud</a><span class="sep">·</span>
    <a href="stud-hi-lo.html">Stud Hi/Lo</a><span class="sep">·</span>
    <strong>Razz</strong><span class="sep">·</span>
    <a href="street.html">Street Analysis</a>
  </div>

  <div id="initStatus" class="init-status">Initializing evaluator...</div>

  <div class="controls">
    <div class="field">
      <label for="runs">Runs / Hand</label>
      <input type="number" id="runs" value="10000" min="100" max="100000" step="1000" />
    </div>
    <div class="field">
      <label for="opponents">Opponents</label>
      <input type="number" id="opponents" value="1" min="0" max="6" step="1" />
    </div>
    <button id="run" disabled>Run Simulation</button>
  </div>

  <div id="progressContainer" class="progress-container">
    <div class="progress-bar-bg">
      <div id="progressFill" class="progress-bar-fill"></div>
    </div>
    <div id="progressText" class="progress-text"></div>
  </div>

  <div id="results" class="results-container"></div>

  <script type="module" src="/src/razz-main.ts"></script>
</body>
</html>
